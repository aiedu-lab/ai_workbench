# Triggered via `@claude review` to GitHub "Conversations" tab.
# Reference the "Files Changes" GitHub tab to see inline (diff) comment blocks 
# from "Claude" appear directly below code line. These comments are also 
# mirrored in the bottom of "Converation" GitHub tab
name: Claude PR Review
on:
  issue_comment:
    types: [created]
jobs:
  claude-review:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          show_full_output: true
          claude_args: "--max-turns 10 --allowedTools 'Bash(gh pr diff*),Bash(gh pr view*),Bash(gh pr comment*),Bash(gh api*)'"
          prompt: |
            Review PR #${{ github.event.issue.number }} in this repository.
            Run: gh pr diff ${{ github.event.issue.number }}
            Then review the changes for:
            - Logic errors and edge cases
            - Security vulnerabilities  
            - Missing error handling
            - CLAUDE.md rule violations
            Post inline comments on specific lines using the GitHub API.
            Only flag high-confidence issues.